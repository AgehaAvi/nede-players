<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nede — Player Codex</title>
  <style>
    :root { color-scheme: dark; --bg:#100d0a; --panel:#1c1712; --panel2:#261f18; --line:rgba(226,185,111,.25); --text:#f4ead6; --muted:#b7a98f; --accent:#d8a84f; --danger:#d05c48; --good:#8ba66a; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif; color:var(--text); background: radial-gradient(circle at top left, rgba(216,168,79,.18), transparent 28rem), linear-gradient(135deg, #0f0c09, #1b1510 45%, #0d0c0b); }
    body:before { content:""; position:fixed; inset:0; pointer-events:none; opacity:.08; background-image: repeating-linear-gradient(90deg, #fff 0 1px, transparent 1px 4px); mix-blend-mode:overlay; }
    .shell { display:grid; grid-template-columns:280px 1fr; min-height:100vh; }
    aside { border-right:1px solid var(--line); padding:24px; background:rgba(14,11,8,.78); backdrop-filter: blur(10px); position:sticky; top:0; height:100vh; overflow:auto; }
    .brand { display:flex; gap:14px; align-items:center; margin-bottom:22px; }
    .mark { width:46px; height:46px; display:grid; place-items:center; border:1px solid var(--line); border-radius:15px; background:linear-gradient(135deg, rgba(216,168,79,.35), rgba(255,255,255,.05)); color:var(--accent); font-weight:900; font-size:24px; }
    .eyebrow { margin:0 0 4px; color:var(--accent); text-transform:uppercase; letter-spacing:.13em; font-size:11px; }
    h1,h2,h3 { margin:0; }
    h1 { font-size:28px; }
    .tabs { display:grid; gap:8px; }
    .tab { border:1px solid transparent; border-radius:14px; padding:12px; background:transparent; color:var(--muted); cursor:pointer; text-align:left; display:flex; gap:10px; align-items:center; font:inherit; width:100%; }
    .tab:hover,.tab.active { color:var(--text); background:rgba(255,255,255,.06); border-color:var(--line); }
    .tab small { margin-left:auto; color:var(--accent); opacity:.8; }
    .notice { margin-top:24px; padding:14px; border:1px solid rgba(139,166,106,.3); border-radius:16px; background:rgba(139,166,106,.08); color:var(--muted); font-size:13px; line-height:1.45; }
    main { padding:34px; max-width:1220px; width:100%; }
    .hero { display:flex; justify-content:space-between; gap:20px; align-items:flex-end; margin-bottom:22px; }
    .hero h2 { font-size:42px; letter-spacing:-.04em; }
    .hero p:not(.eyebrow) { color:var(--muted); margin:8px 0 0; }
    .search { width:min(520px,100%); display:flex; align-items:center; gap:8px; padding:12px 14px; border-radius:16px; border:1px solid var(--line); background:rgba(0,0,0,.22); }
    .search input { width:100%; border:0; outline:0; background:transparent; color:var(--text); font:inherit; }
    .stats { display:grid; grid-template-columns:repeat(4,minmax(140px,1fr)); gap:12px; margin-bottom:20px; }
    .stat { padding:16px; border:1px solid var(--line); border-radius:18px; background:rgba(255,255,255,.05); }
    .stat span { display:block; color:var(--muted); font-size:13px; } .stat strong { font-size:30px; }
    .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:16px; }
    .card { min-height:250px; overflow:hidden; border:1px solid var(--line); border-radius:22px; background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)); box-shadow:0 22px 60px rgba(0,0,0,.28); }
    .cover { height:112px; background:linear-gradient(135deg, rgba(216,168,79,.25), rgba(0,0,0,.12)); background-size:cover; background-position:center; border-bottom:1px solid var(--line); }
    .card.critical { border-color:rgba(208,92,72,.42); } .card.high { border-color:rgba(216,168,79,.45); }
    .body { padding:16px; }
    .top { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .subtitle { color:var(--muted); font-size:13px; margin-top:4px; }
    .pill { flex:0 0 auto; border:1px solid var(--line); border-radius:999px; padding:5px 8px; color:var(--accent); font-size:12px; background:rgba(216,168,79,.08); }
    .desc { color:#dfd2b8; line-height:1.55; font-size:14px; }
    .tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:12px; }
    .tag { color:var(--muted); font-size:12px; padding:5px 7px; border-radius:999px; background:rgba(255,255,255,.06); }
    .section-badge { color:var(--accent); border:1px solid var(--line); border-radius:999px; padding:5px 7px; font-size:12px; background:rgba(216,168,79,.08); }
    .empty { color:var(--muted); border:1px dashed var(--line); border-radius:20px; padding:24px; grid-column:1/-1; line-height:1.55; background:rgba(0,0,0,.15); }
    .empty strong { display:block; color:var(--text); margin-bottom:6px; font-size:18px; }
    .card.with-image { cursor: zoom-in; }
    .card.with-image:hover { transform: translateY(-2px); border-color: rgba(216,168,79,.55); transition: 160ms ease; }
    .cover.has-image { position: relative; }
    .cover.has-image:after { content:"Открыть картинку"; position:absolute; right:10px; bottom:10px; padding:7px 10px; border:1px solid rgba(244,234,214,.24); border-radius:999px; background:rgba(16,13,10,.72); color:var(--text); font-size:12px; font-weight:800; opacity:0; transform:translateY(4px); transition:160ms ease; }
    .card.with-image:hover .cover.has-image:after { opacity:1; transform:translateY(0); }
    .lightbox { position:fixed; inset:0; z-index:1000; display:none; align-items:center; justify-content:center; padding:30px; background:rgba(0,0,0,.9); backdrop-filter:blur(10px); }
    .lightbox.open { display:flex; }
    .lightbox img { max-width:min(1180px,94vw); max-height:82vh; width:auto; height:auto; object-fit:contain; border:1px solid rgba(244,234,214,.18); border-radius:22px; background:#080605; box-shadow:0 28px 90px rgba(0,0,0,.62); }
    .lightbox button { position:absolute; top:20px; right:20px; width:46px; height:46px; border:1px solid rgba(244,234,214,.22); border-radius:16px; color:var(--text); background:rgba(22,17,12,.86); cursor:pointer; font-size:28px; line-height:1; }
    .lightbox button:hover { border-color:rgba(216,168,79,.7); background:rgba(216,168,79,.14); }
    .caption { position:absolute; left:50%; bottom:20px; transform:translateX(-50%); max-width:min(780px,calc(100vw - 40px)); padding:10px 14px; border:1px solid rgba(244,234,214,.16); border-radius:999px; color:var(--text); background:rgba(22,17,12,.78); text-align:center; font-weight:800; }
    body.lightbox-open { overflow:hidden; }
    @media (max-width:820px){ .shell{grid-template-columns:1fr} aside{position:relative;height:auto}.stats{grid-template-columns:repeat(2,1fr)} .hero{display:block}.search{margin-top:16px}.hero h2{font-size:34px}.lightbox{padding:18px}.lightbox img{max-width:96vw;max-height:78vh;border-radius:16px}.caption{bottom:14px;border-radius:16px}.lightbox button{top:14px;right:14px} }
  </style>

  <script>
    const payload = JSON.parse(document.getElementById("nede-data").textContent);
    const baseSections = payload.sections || [];
    const data = payload.data || {};
    const homeSection = { id:"home", icon:"⌂", title:"Домой", kicker:"Открытая база", description:"Краткий обзор открытых записей, известных NPC, локаций, фракций и квестов." };
    const sections = [homeSection].concat(baseSections);
    let current = "home";
    const tabs = document.getElementById("tabs"), cards = document.getElementById("cards"), stats = document.getElementById("stats"), q = document.getElementById("q");
    const kicker = document.getElementById("kicker"), title = document.getElementById("title"), desc = document.getElementById("desc");

    function esc(v){return String(v || "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
    function attr(v){return esc(v || "").replaceAll(String.fromCharCode(96),"&#096;");}
    function sectionById(id){return sections.find(function(s){return s.id===id;}) || homeSection;}
    function sectionCount(id){return (data[id] || []).length;}
    function allEntries(){return baseSections.flatMap(function(s){return (data[s.id] || []).map(function(e){return Object.assign({sectionId:s.id, sectionTitle:s.title}, e);});});}
    function importanceValue(v){return {critical:3, high:2, normal:1}[v] || 0;}

    function renderTabs(){
      tabs.innerHTML = sections.map(function(s){
        const count = s.id === "home" ? allEntries().length : sectionCount(s.id);
        return '<button class="tab '+(s.id===current?'active':'')+'" type="button" data-id="'+attr(s.id)+'"><span>'+esc(s.icon)+'</span><span>'+esc(s.title)+'</span><small>'+count+'</small></button>';
      }).join("");
    }

    function renderStats(){
      const all = allEntries();
      stats.innerHTML = '<div class="stat"><span>Открытых записей</span><strong>'+all.length+'</strong></div><div class="stat"><span>NPC</span><strong>'+sectionCount('npcs')+'</strong></div><div class="stat"><span>Квестов</span><strong>'+sectionCount('quests')+'</strong></div><div class="stat"><span>Локаций</span><strong>'+sectionCount('locations')+'</strong></div>';
    }

    function visibleEntries(){
      const query = q.value.trim().toLowerCase();
      const source = current === "home" ? allEntries().sort(function(a,b){return importanceValue(b.importance)-importanceValue(a.importance);}) : (data[current] || []).map(function(e){return Object.assign({sectionId:current, sectionTitle:sectionById(current).title}, e);});
      return source.filter(function(e){
        if(!query) return true;
        return [e.name,e.subtitle,e.status,e.description,e.sectionTitle].concat(e.tags||[]).join(' ').toLowerCase().includes(query);
      });
    }

    function render(){
      const section = sectionById(current);
      kicker.textContent = section.kicker || "Открытая база";
      title.textContent = section.title || "Nede";
      desc.textContent = section.description || "Открытая информация кампании.";
      renderTabs();
      renderStats();
      const entries = visibleEntries();
      if(entries.length){
        cards.innerHTML = entries.map(card).join("");
      } else if(allEntries().length === 0) {
        cards.innerHTML = '<div class="empty"><strong>Пока нет открытых записей.</strong>Мастер ещё не открыл NPC, локации, фракции или квесты для игроков.</div>';
      } else {
        cards.innerHTML = '<div class="empty"><strong>Ничего не найдено.</strong>Попробуй очистить поиск или открыть другую вкладку.</div>';
      }
    }

    function card(e){
      const hasImage = Boolean(e.imageData);
      const img=hasImage?' style="background-image:linear-gradient(180deg,rgba(0,0,0,.05),rgba(16,13,10,.6)),url(&quot;'+attr(e.imageData)+'&quot;)"':"";
      const imageAttrs = hasImage ? ' data-image="'+attr(e.imageData)+'" data-title="'+attr(e.name)+'"' : '';
      const status=e.status?'<span class="pill">'+esc(e.status)+'</span>':"";
      const tags=(e.tags||[]).map(function(t){return '<span class="tag">#'+esc(t)+'</span>';}).join("");
      const sectionBadge = current === "home" ? '<span class="section-badge">'+esc(e.sectionTitle || '')+'</span>' : '';
      return '<article class="card '+attr(e.importance || 'normal')+(hasImage?' with-image':'')+'"'+imageAttrs+'><div class="cover '+(hasImage?'has-image':'')+'"'+img+'></div><div class="body"><div class="top"><div><h3>'+esc(e.name)+'</h3><div class="subtitle">'+esc(e.subtitle||'Без подзаголовка')+'</div></div>'+status+'</div><p class="desc">'+esc(e.description||'Описание пока не заполнено.')+'</p><div class="tags">'+sectionBadge+tags+'</div></div></article>';
    }

    function openLightbox(src, captionText){
      const box=document.getElementById("lightbox"), img=document.getElementById("lightboxImg"), caption=document.getElementById("lightboxCaption");
      if(!src || !box || !img) return;
      img.src=src; img.alt=captionText || "Картинка";
      if(caption) caption.textContent=captionText || "Картинка";
      box.classList.add("open");
      box.setAttribute("aria-hidden","false");
      document.body.classList.add("lightbox-open");
    }

    function closeLightbox(){
      const box=document.getElementById("lightbox"), img=document.getElementById("lightboxImg");
      if(!box || !img) return;
      box.classList.remove("open");
      box.setAttribute("aria-hidden","true");
      img.src="";
      document.body.classList.remove("lightbox-open");
    }

    tabs.addEventListener("click",function(e){const b=e.target.closest("button"); if(!b)return; current=b.dataset.id || "home"; q.value=""; render();});
    q.addEventListener("input", render);
    cards.addEventListener("click",function(e){const card=e.target.closest(".card.with-image"); if(!card)return; openLightbox(card.dataset.image, card.dataset.title || "Картинка");});
    document.getElementById("closeLightbox").addEventListener("click", closeLightbox);
    document.getElementById("lightbox").addEventListener("click",function(e){if(e.target===this) closeLightbox();});
    document.addEventListener("keydown",function(e){if(e.key==="Escape") closeLightbox();});
    render();
  </script>
</body>
</html>
